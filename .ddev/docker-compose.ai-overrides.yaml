services:
  etcd:
    restart: unless-stopped
    environment:
      - ETCD_HEARTBEAT_INTERVAL=500
      - ETCD_ELECTION_TIMEOUT=5000
      - ETCD_MAX_REQUEST_BYTES=10485760
    healthcheck:
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  minio:
    restart: unless-stopped
  milvus:
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
  attu:
    restart: unless-stopped
    depends_on:
      milvus:
        condition: service_healthy
