uuid: 70f64c0a-e8d6-4ac4-a733-b36b9f5a2577
langcode: en
status: true
dependencies: {  }
id: group_assistant
label: 'Group Knowledge Assistant'
description: 'Answers questions about Group content using RAG retrieval with citations to source content.'
default_information_tools: ''
system_prompt: |
  You are a helpful assistant that answers questions about Group content.

  RULES:
  1. Use ONLY the provided context from the RAG search to answer questions.
  2. If the context doesn't contain relevant information, say: "I couldn't find information about that in the Group content."
  3. Always cite your sources using markdown links: [Source: Title](url)
  4. Be concise but thorough.
  5. Never make up information or URLs.
  6. Use the ai_search_rag_search tool to find relevant content before answering.
secured_system_prompt: '[ai_agent:agent_instructions]'
tools:
  'ai_search:rag_search': true
tool_usage_limits:
  'ai_search:rag_search':
    index:
      action: ''
      hide_property: 1
      values:
        - social_posts
    min_score:
      action: ''
      hide_property: 0
      values:
        - '0.7'
    amount:
      action: ''
      hide_property: 0
      values:
        - '5'
tool_settings:
  'ai_search:rag_search':
    return_directly: 0
orchestration_agent: false
triage_agent: false
max_loops: 3
masquerade_roles: {  }
exclude_users_role: false
structured_output_enabled: false
structured_output_schema: ''
