chat:
  input:
    description: 'Input provided to the model.'
    type: 'array'
    default:
      - { role: "system", content: "You are a helpful assistant." }
      - { role: "user", content: "Introduce yourself!" }
    required: true
  authentication:
    description: 'Gemini API Key.'
    type: 'string'
    default: ''
    required: true
  configuration:
    stopSequences:
      label: 'Stop Sequences'
      description: 'The set of character sequences (up to 5) that will stop output generation'
      type: 'string'
      default: ''
      required: false
    maxOutputTokens:
      label: 'Max Tokens'
      description: 'The maximum number of tokens to include in a response candidate'
      type: 'integer'
      default: 1024
      required: false
    temperature:
      label: 'Temperature'
      description: 'Sampling temperature 0-1. Higher values mean more random output.'
      type: 'float'
      default: ''
      required: false
      constraints:
        min: 0
        max: 2
        step: 0.1
    topP:
      label: 'Top P'
      description: 'An alternative to sampling with temperature, called nucleus sampling.'
      type: 'float'
      default:
      required: false
      constraints:
        min: 0
        max: 1
        step: 0.1
    topK:
      label: 'Top K'
      description: 'Used to remove "long tail" low probability responses. '
      type: 'float'
      default:
      required: false
      constraints:
        min: 0
        max: 1
        step: 0.1
    responseSchema:
      label: 'Response Schema'
      description: 'Output schema of the generated candidate text. Schemas must be a subset of the OpenAPI schema and can be objects, primitives or arrays. If set, compatible response mime type must also be set.'
      type: 'string'
      default: 'string'
      required: false
    responseMimeType:
      label: 'Response MimeType'
      description: 'MIME type of the generated candidate text. Supported ones are text/plain and application/json.'
      type: 'string'
      default: 'text/plain'
      required: false
text_to_image:
  input:
    description: 'Text prompt describing the image to generate.'
    type: 'string'
    default: 'A photo of a cat'
    required: true
  authentication:
    description: 'Gemini API Key.'
    type: 'string'
    default: ''
    required: true
  configuration:
    aspectRatio:
      label: 'Aspect Ratio'
      description: 'The aspect ratio for the generated image. Supported values: 1:1, 2:3, 3:2, 3:4, 4:3, 9:16, 16:9.'
      type: 'string'
      default: '1:1'
      required: false
speech_to_text:
  input:
    description: 'Binary of audio file to be transcribed.'
    type: 'string'
    default: ''
    required: true
  authentication:
    description: 'Gemini API Key.'
    type: 'string'
    default: ''
    required: true
  configuration:
    language:
      label: 'Language'
      description: 'The language of the audio file. Supplying the input language in ISO-639-1 format will improve accuracy and latency.'
      type: 'string'
      default: ''
      required: false
