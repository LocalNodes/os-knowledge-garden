  body: >
    <p>Bring your saved seeds, plant starts, and growing tips to share with fellow Front Range growers. This is our spring seed swap where we strengthen the genetic diversity of our regional food systems by exchanging locally adapted varieties that thrive at 5,400 feet in our semi-arid climate.</p>

    <p>Lucia will lead a workshop on high-altitude permaculture techniques -- including water harvesting, wind protection, and season extension strategies for the Front Range's short growing season. We will have tables organized by plant family and a special section for heirloom Colorado varieties. Even if you do not have seeds to bring, come learn and take home something to grow. Food sovereignty starts in the seed.</p>
