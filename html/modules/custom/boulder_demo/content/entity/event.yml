# Event 2: Beaver Dam Analog Build Day at Caribou Ranch (future +14 day, public, no group)
e2a2b2c2-d2e2-4f2a-b2c2-d2e2f2a2b2c2:
  uuid: e2a2b2c2-d2e2-4f2a-b2c2-d2e2f2a2b2c2
  title: Beaver Dam Analog Build Day at Caribou Ranch
  type: event
  langcode: en
  uid: 11223344-5566-4778-8990-aabbccddeef0
  body: >
    <p>Come get your hands muddy! Join us at Caribou Ranch Open Space for a hands-on beaver dam analog (BDA) build day. BDAs are simple, low-tech structures -- posts driven into the streambed with woven willow branches -- that mimic the function of natural beaver dams. They slow water, raise water tables, and help degraded streams rebuild their braided channels and floodplain connectivity.</p>

    <p>This is low-tech process-based restoration (LTPBR) in action. No engineering degree required -- just a willingness to stand in a cold stream and weave branches. Rowan will lead the installation, explaining the science behind beaver mimicry structures and how they transform stream complexity over time. We will build 3-5 structures on a tributary that has been incised from decades of channel straightening.</p>

    <p>Bring waterproof boots, warm layers, work gloves, and lunch. Tools and materials provided. All skill levels welcome -- this is how we learn to restore the Front Range one stream reach at a time.</p>
  field_event_address:
    country_code: US
    locality: Nederland
    postal_code: 80466
    address_line1: Highway 72
  field_event_date: +14 day|09:00
  field_event_date_end: +14 day|15:00
