# Event 6: Quadratic Funding Workshop (future +45 day, community, Regen Tech)
e6a6b6c6-d6e6-4f6a-b6c6-d6e6f6a6b6c6:
  uuid: e6a6b6c6-d6e6-4f6a-b6c6-d6e6f6a6b6c6
  title: "Quadratic Funding Workshop: How to Run a Local QF Round"
  type: event
  langcode: en
  uid: dd44ee55-ff66-4778-8990-0aa11bb22cc3
  body: >
    <p>Learn how quadratic funding works and how to run a local QF round for Front Range public goods. QF is a democratic funding mechanism where many small contributions are amplified by a matching pool -- meaning projects that matter to the most people get the most funding, regardless of how wealthy individual donors are. Think of it as Gitcoin-style funding rounds but for your bioregion.</p>

    <p>Devon will walk through the mechanics of QF, share case studies from successful rounds in other communities, and lead a hands-on exercise designing a pilot round for Boulder. We will discuss what kinds of projects to include (watershed restoration, food commons, community infrastructure, mutual aid), how to structure the matching pool, and how to use the Schelling Point App for transparent voting.</p>

    <p>This workshop is for anyone curious about Ethereum localism in practice -- no crypto background needed. We will focus on the coordination mechanism, not the technology stack. Public goods funding is about community priorities, not protocol complexity.</p>
  field_event_address:
    country_code: US
