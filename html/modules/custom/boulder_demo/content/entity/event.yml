  uid: ee55ff66-7788-4990-0aa1-1bb22cc33dd4
  body: >
    <p>Join us for the first Front Range Bioregional Assembly, bringing together stewards, builders, and organizers from across Boulder County and the greater South Platte watershed. This is where delegates from every working group come together to share reports, make collective decisions, and strengthen the bonds that hold our bioregional network together.</p>

    <p>This year's assembly will focus on three themes: Front Range watershed health indicators from our community science monitoring, the proposal for a quadratic funding round for local public goods, and polycentric governance in practice -- bridging DAO tools with consensus-based facilitation. Each group will present their seasonal stewardship report.</p>

    <p>Whether you have been building beaver dam analogs on Caribou Ranch, running mutual credit experiments, growing food forests in Longmont, or hacking at RegenHub, the Assembly is your chance to see how all these threads weave together into a coherent bioregional practice. Come learn, contribute, and celebrate the living systems of the Front Range.</p>
