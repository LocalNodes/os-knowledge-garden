    <p>Gather with your community to celebrate the summer solstice and honor the waters that sustain the Front Range. This is a time for storytelling, song, shared food, and renewing our commitment to the land and water of this bioregion.</p>

    <p>Talia Redhawk will open the gathering with an acknowledgment of the Arapaho and Cheyenne peoples whose territory includes the Front Range and whose relationship to these waters stretches back thousands of years. We will hold community sharing circles along Boulder Creek, followed by a potluck feast featuring food grown within our bioregion. Bring something to share -- food, a story, a song, or simply your presence.</p>

    <p>This gathering is open to everyone. Come celebrate the longest day of the year where the mountains meet the plains, where the Continental Divide sends water on its 2,000-mile journey to the Gulf.</p>
