    <p>Watershed monitors, data scientists, and community members gathered for a full-day data jam to analyze the latest water quality data from our monitoring stations along Boulder Creek and South Platte tributaries. Zara Okafor led this session, combining CU Boulder research methods with community science data collected by volunteer monitors throughout the season.</p>

