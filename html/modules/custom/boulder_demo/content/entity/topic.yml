# Topic 7: Front Range Food Forest Design (Blog, community, Food Commons)
t7a7b7c7-d7e7-4f7a-b7c7-d7e7f7a70007:
  uuid: t7a7b7c7-d7e7-4f7a-b7c7-d7e7f7a70007
  title: "Front Range Food Forest Design for Semi-Arid Climates"
  type: topic
  langcode: en
  uid: cc33dd44-ee55-4ff6-6778-89900aa11bb2
  body: >
    <p>Designing food forests on the Front Range means working with conditions that most permaculture textbooks were not written for. At 5,400 feet with 300 days of sunshine, only 18 inches of annual rainfall, dramatic temperature swings, and intense UV radiation, we need to adapt the seven-layer food forest model for our unique semi-arid, high-altitude reality.</p>

    <p><strong>Water First:</strong> Every food forest design on the Front Range starts with water harvesting. We design swales, berms, and rain gardens to capture every drop of our precious rainfall and snowmelt. A well-designed water harvesting landscape can effectively triple your rainfall -- turning 18 inches into the equivalent of 54 inches for the plants in your swales.</p>

    <p><strong>Wind Protection:</strong> Front Range winds are legendary. Windbreak hedgerows of native chokecherry, serviceberry, and currant go in first, creating microclimates where more delicate species can establish. Think of it as building rooms in the landscape.</p>

    <p><strong>Season Extension:</strong> Our growing season is short -- typically mid-May to mid-October. Cold frames, row covers, and thermal mass walls extend the season by 4-6 weeks on each end. Hoop houses are game-changers at altitude.</p>

    <p><strong>Native Integration:</strong> The most resilient food forests here integrate native Front Range species like wild plum, chokecherry, serviceberry, and native currants alongside traditional permaculture crops. These plants are already adapted to our soil, our light, and our water patterns.</p>

    <p>If you are interested in designing a food forest for your site, come to the Seed Swap workshop next week. We will do site assessment exercises and I can help you get started.</p>
  field_topic_type: Blog
  image: f3c4d5e6-f7a8-4b9c-0d1e-2f3a4b5c6d7e
  image_alt: Permaculture garden on the Front Range
  group: ccdd3344-5566-4778-8990-011223344556
  field_content_visibility: community

# Topic 8: Community Currency Pilot Lessons (News, community, Regen Tech)
t8a8b8c8-d8e8-4f8a-b8c8-d8e8f8a80008:
  uuid: t8a8b8c8-d8e8-4f8a-b8c8-d8e8f8a80008
  title: "Community Currency Pilot: Lessons from Month One"
  type: topic
  langcode: en
  uid: dd44ee55-ff66-4778-8990-0aa11bb22cc3
  body: >
    <p>One month into our Boulder mutual credit pilot, here is what we have learned. The Boulder Mutual Credit Lab launched a small-scale experiment with 24 participants across the regen community -- including RegenHub co-workers, Watershed Hub volunteers, and Food Commons growers.</p>

    <p><strong>What Worked:</strong> The commitment pooling model resonated strongly. Participants made promises to each other (hours of garden help, co-working space access, monitoring training, tool lending) and tracked them through a simple ledger. The average participant made 3.2 exchanges in the first month. The most popular exchanges were food-for-labor and skill-for-space.</p>

    <p><strong>What Surprised Us:</strong> The social effect was more powerful than the economic one. Participants reported feeling more connected to the community after making even small exchanges. The currency was less about efficiency and more about making visible the mutual aid that was already happening informally.</p>

    <p><strong>What Needs Work:</strong> The onboarding friction was too high -- we need simpler tools. Some participants felt uncomfortable pricing their contributions. And we need better integration with the groups here on LocalNodes so exchanges can happen more organically.</p>

    <p>Next month we are expanding to 40 participants and testing a simplified mobile interface. If you want to join the pilot, reach out to Devon or check the Regen Tech group announcements.</p>
  field_topic_type: News
  image:
  image_alt:
  group: bbcc2233-4455-4667-7889-900112233445
  field_content_visibility: community

