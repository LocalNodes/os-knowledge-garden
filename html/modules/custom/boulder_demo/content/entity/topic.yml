# Topic 10: Mapping Boulder's Water Bioregion (Dialog, community, Watershed Hub)
t10a0b0c0-d0e0-4f0a-b0c0-d0e0f0a00010:
  uuid: t10a0b0c0-d0e0-4f0a-b0c0-d0e0f0a00010
  title: "Mapping Boulder's Water Bioregion: From Continental Divide to Gulf"
  type: topic
  langcode: en
  uid: ff667788-9900-4aa1-1bb2-2cc33dd44ee5
  body: >
    <p>I am launching a participatory mapping project to trace Boulder's water bioregion from the Continental Divide to the Gulf of Mexico. Every drop of water that falls on the Front Range starts a 2,000-mile journey through the South Platte, the Missouri, and the Mississippi. Understanding this journey is understanding our place in a much larger living system.</p>

    <p><strong>What We Want to Map:</strong></p>
    <ul>
    <li>Boulder Creek watershed boundaries and all tributaries</li>
    <li>BDA installation sites and their monitoring data</li>
    <li>Riparian restoration areas and native planting sites</li>
    <li>Community gardens, food forests, and seed libraries</li>
    <li>Community science monitoring stations</li>
    <li>Historical Arapaho and Cheyenne water relationships (with community guidance from Talia)</li>
    </ul>

    <p>CU Boulder Environmental Studies can provide base GIS layers and hosting. What we need from the community is local knowledge -- you know your stretches of creek, your monitoring sites, your gardens. Rowan, can you share the GPS coordinates for all BDA installations? Lucia, where are the food forests and community gardens? Talia, would you be willing to help us respectfully include indigenous water relationships?</p>

    <p>This map would be a powerful tool for our quadratic funding round too -- showing potential funders exactly where their contributions would make a difference in our bioregion.</p>
  field_topic_type: Dialog
  image: d1a2b3c4-d5e6-4f7a-8b9c-0d1e2f3a4b5c
  image_alt: Front Range watershed map
  group: aabb1122-3344-4556-6778-899001122334
  field_content_visibility: community
