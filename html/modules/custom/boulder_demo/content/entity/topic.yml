# Topic 4: Proposal: Quadratic Funding Round (Dialog, community, Regen Tech)
t4a4b4c4-d4e4-4f4a-b4c4-d4e4f4a40004:
  uuid: t4a4b4c4-d4e4-4f4a-b4c4-d4e4f4a40004
  title: "Proposal: Quadratic Funding Round for Front Range Public Goods"
  type: topic
  langcode: en
  uid: dd44ee55-ff66-4778-8990-0aa11bb22cc3
  body: >
    <p>Regen Tech Collective members, I would like to propose that we organize Boulder's first quadratic funding round for Front Range public goods. Here is the structure I have been developing with input from several community members.</p>

    <p><strong>The Proposal:</strong> A QF round with a $10,000 matching pool, open to any project that serves the Front Range bioregion. Community members contribute small amounts (even $1) to projects they care about, and the matching pool amplifies those contributions quadratically. Projects with broad community support receive more matching funds than projects with a few large donors.</p>

    <p><strong>Eligible Project Categories:</strong></p>
    <ul>
    <li>Watershed restoration (BDA installations, native planting, monitoring equipment)</li>
    <li>Food commons infrastructure (seed libraries, community gardens, food rescue logistics)</li>
    <li>Community spaces (RegenHub improvements, gathering supplies, event equipment)</li>
    <li>Knowledge commons (documentation, training materials, community science tools)</li>
    <li>Mutual aid infrastructure (tool libraries, community currencies, skill-sharing platforms)</li>
    </ul>

    <p><strong>Matching Pool Funding:</strong> We propose sourcing the matching pool from a combination of the Boulder node treasury, voluntary contributions from community members, and a partnership with the OpenCivics Consortium which has expressed interest in supporting bioregional QF experiments.</p>

    <p>This would be a powerful demonstration of Ethereum localism in practice -- democratic funding for the things our community actually needs, governed transparently on-chain. What questions or concerns do you have? I would love to discuss at the next Regen Tech Collective meeting.</p>
  field_topic_type: Dialog
  image: a4d5e6f7-a8b9-4c0d-1e2f-3a4b5c6d7e8f
  image_alt: Community planning session
  group: bbcc2233-4455-4667-7889-900112233445
