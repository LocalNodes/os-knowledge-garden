  title: "Treasury Allocation Discussion: Boulder Node Q2"
  type: topic
  langcode: en
  uid: ee55ff66-7788-4990-0aa1-1bb22cc33dd4
  body: >
    <p>Governance Circle members, it is time to discuss how we allocate the Boulder node treasury for Q2. Our current balance is $8,200 from membership contributions, event revenue, and a small grant from the OpenCivics Consortium.</p>

    <p><strong>Proposed Allocations:</strong></p>
    <ul>
    <li>QF matching pool seed funding: $3,000</li>
    <li>BDA materials and monitoring equipment: $1,500</li>
    <li>RegenHub rent and utilities subsidy: $1,200</li>
    <li>Community science monitoring kits: $800</li>
    <li>Youth ambassador program stipends: $1,000</li>
    <li>Emergency mutual aid reserve: $700</li>
    </ul>

    <p>The big question is the QF matching pool allocation. If we commit $3,000, combined with OpenCivics matching and community contributions, we could run a meaningful pilot round. But that is a significant chunk of our treasury. The alternative is to start smaller at $1,500 and supplement with a fundraising campaign.</p>

    <p>Please share your thoughts in the comments. We will aim to reach consensus at the next governance circle. Remember, our hybrid governance model means this discussion happens both here and in a snapshot vote for the on-chain record.</p>
  field_topic_type: Dialog
