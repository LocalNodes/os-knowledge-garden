  body: >
    This is a great proposal, Anil. From the land trust perspective, solar infrastructure on commons property would benefit all trust members. I have a few questions about the community share structure -- can households invest in fractions of a share? We want to make sure this is accessible to everyone, not just those with $500 to invest.
