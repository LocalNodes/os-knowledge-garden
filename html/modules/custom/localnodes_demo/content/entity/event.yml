# Cascadia Bioregional Assembly (future +30 day, community, Bioregional Hub)
99cbb48a-9cb0-480e-a6e1-43c352cb2434:
  uuid: 99cbb48a-9cb0-480e-a6e1-43c352cb2434
  title: Cascadia Bioregional Assembly
  type: event
  langcode: en
  uid: 063ea337-4bcf-421b-b30c-1e75f3c5ef78
  body: >
    <p>Join us for the annual Cascadia Bioregional Assembly, our largest gathering of the year. This is where delegates from watersheds across Cascadia come together to share reports, make collective decisions, and strengthen the bonds that hold our bioregional network together.</p>

    <p>This year's assembly will focus on three themes: watershed health indicators, cosmolocal resource sharing, and polycentric governance in practice. Each watershed group will present their annual stewardship report, and we will hold council circles to address cross-bioregional challenges.</p>

    <p>Whether you are a long-time bioregionalist or just beginning to explore what it means to live in place, the Assembly is for you. Come learn, contribute, and celebrate the living systems that sustain us all.</p>
  field_event_address:
    country_code: US
    locality: Seattle
    postal_code: 98101
    address_line1: 305 Harrison Street
  field_event_date: +30 day|09:00
  field_event_date_end: +30 day|18:00
