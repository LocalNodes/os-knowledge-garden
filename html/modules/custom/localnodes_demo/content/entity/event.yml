  title: Regenerative Economics Workshop
  type: event
  langcode: en
  uid: 6bd61fae-71f2-4376-9b46-85cbd6bc2c59
  body: >
    <p>Explore the principles and practices of regenerative economics in this hands-on workshop. We will cover mutual aid network design, community currency models, cooperative governance structures, and resource pooling strategies that keep wealth circulating within bioregions.</p>

    <p>This workshop is for anyone who wants to move beyond extractive economics and build systems where resources flow like water through a healthy watershed -- nourishing everything they touch.</p>
