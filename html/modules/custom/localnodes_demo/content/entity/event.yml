  uid: 9e4768e4-32fa-4191-8f58-6e519988c3d8
  body: >
    <p>Come visit the Cascadia Commons and see what community land stewardship looks like in practice. We will tour the community gardens, affordable housing units, and the new food forest that was planted last season.</p>

