# Watershed Monitoring Training (future +14 day, public, no group)
ed8e50c0-3215-4c96-968a-7a571cd20829:
  uuid: ed8e50c0-3215-4c96-968a-7a571cd20829
  title: Watershed Monitoring Training
  type: event
  langcode: en
  uid: bcead200-a74f-4e24-93c4-2746436a5207
  body: >
    <p>Learn how to monitor the health of your local watershed. This hands-on training covers water quality testing, macroinvertebrate sampling, and riparian habitat assessment. Open to everyone -- no prior experience needed.</p>

    <p>We will meet at the Nooksack River trailhead and spend the morning learning field techniques, followed by an afternoon of actual data collection that will be contributed to our community science database. Bring waterproof boots and a notebook.</p>
