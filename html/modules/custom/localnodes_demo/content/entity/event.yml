  title: Data Sovereignty Workshop
  type: event
  langcode: en
  uid: 508fefc5-3a18-471e-afc7-f0bd6686f850
  body: >
    <p>How do we govern the data our communities generate? This workshop explored the principles of data sovereignty as they apply to bioregional organizing. We covered community data governance frameworks, privacy-preserving tools, and the ethics of AI in community platforms.</p>

    <p>Omar Hassan led this session drawing on indigenous data sovereignty principles and modern cooperative data governance models. The workshop notes and resources are available in the Bioregional Hub group files.</p>
