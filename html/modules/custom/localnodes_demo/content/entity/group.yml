  description: >
    <p>The Regenerative Economics Working Group explores how to build economic systems that regenerate rather than extract. We discuss mutual aid networks, community currencies, cooperative models, and resource pooling strategies that keep wealth circulating within our bioregion. Economics should serve life, not the other way around.</p>
