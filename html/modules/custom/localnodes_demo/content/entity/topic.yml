# Topic 1: Welcome to LocalNodes (Blog, public, no group) -- LONG for chunking
90f14e5e-ac2c-4f5f-a06e-f274d82e1214:
  uuid: 90f14e5e-ac2c-4f5f-a06e-f274d82e1214
  title: "Welcome to LocalNodes: Building the Infrastructure of Belonging"
  type: topic
  langcode: en
  uid: 508fefc5-3a18-471e-afc7-f0bd6686f850
  body: >
    <p><strong>What is LocalNodes?</strong></p>

    <p>LocalNodes is a platform for bioregional organizing -- a digital commons where people who care about their watersheds, their communities, and the living systems that sustain them can connect, coordinate, and create together. We believe that the most meaningful change happens at the scale of the bioregion: the natural territory defined by watersheds, soil types, plant communities, and the cultural relationships that have grown from living in place over generations.</p>

    <p><strong>Why Bioregionalism?</strong></p>

    <p>Bioregionalism is the practice of living as if your place matters. It means understanding the watershed you drink from, the soil that grows your food, the species you share your home with, and the human communities that steward these relationships. In a time of ecological crisis and social fragmentation, bioregionalism offers a path toward resilience rooted in the particular -- not abstract global solutions, but concrete local practices that connect to a larger web of cosmolocal coordination.</p>

    <p><strong>How This Platform Works</strong></p>

    <p>LocalNodes is organized around groups that reflect the working structure of our bioregional network. You will find groups for watershed stewardship, community land trusts, regenerative economics, governance councils, and more. Within each group, members share knowledge through topics, coordinate through events, and stay connected through posts. The platform is powered by Open Social and enhanced with AI features that help surface relevant knowledge across the network -- so the wisdom shared in one watershed can benefit stewards in another.</p>

    <p><strong>Getting Started</strong></p>

    <p>We encourage you to fill out your profile with your interests and expertise, join groups that align with your work, and introduce yourself to the community. Browse the topics to see what conversations are happening, check the events calendar for upcoming gatherings, and do not hesitate to post questions or share what you are learning. Every contribution strengthens the knowledge commons we are building together.</p>

    <p><strong>Our Principles</strong></p>

    <p>LocalNodes is guided by the principles of polycentric governance, data sovereignty, and commons stewardship. We believe that the people closest to the land should have the most voice in decisions about it. We believe that community-generated knowledge belongs to the community. And we believe that technology should serve life, not extract from it. Welcome to the network. Welcome home to your bioregion.</p>
  field_topic_type: Blog
  image: fa8a9b98-fb48-4945-8001-cd6c0ed02540
  image_alt: Bioregional community gathering
  field_content_visibility: public

# Topic 2: What is Bioregionalism? (Blog, community, no group) -- LONG for embedding quality
686671f1-2341-4634-99d7-782e50732e88:
  uuid: 686671f1-2341-4634-99d7-782e50732e88
  title: "What is Bioregionalism? A Living Systems Approach"
  type: topic
  langcode: en
  uid: 7cde7276-0de6-43b9-b52c-642ef8f710b0
  body: >
    <p>Bioregionalism is the idea that human communities should organize themselves around the natural systems that sustain them -- watersheds, soil types, plant communities, and ecological boundaries -- rather than arbitrary political borders drawn on maps. It is both an ancient practice (indigenous peoples have always organized this way) and a modern movement responding to the disconnection that industrial civilization has created between people and place.</p>

    <p><strong>The Watershed as Organizing Principle</strong></p>

    <p>At the heart of bioregionalism is the watershed. Water flows downhill, gathering in streams and rivers that define the natural boundaries of our home places. When we organize around watersheds, we organize around the fundamental ecological unit that connects mountain to sea, forest to farmland, city to countryside. Your watershed is your address in the community of life.</p>

    <p><strong>Polycentric Governance</strong></p>

    <p>Bioregionalism practices polycentric governance -- decision-making that happens at multiple scales simultaneously. Neighborhood assemblies address local concerns, watershed councils coordinate across communities, and bioregional congresses tackle issues that affect the whole region. This is governance that grows from the ground up, like a forest, rather than being imposed from the top down. Each scale of governance is accountable to the others, creating a web of mutual responsibility.</p>

    <p><strong>Cosmolocal Organizing</strong></p>

    <p>While bioregionalism is rooted in the local, it is not parochial. The concept of cosmolocalism describes how bioregional communities can share knowledge globally while acting locally. What one watershed learns about salmon restoration can benefit stewards in another watershed thousands of miles away. Platforms like LocalNodes make this cosmolocal coordination possible -- sharing knowledge as a global commons while keeping action rooted in place.</p>

    <p><strong>The Commons and Mutual Aid</strong></p>

    <p>Bioregional economics is based on the commons -- shared resources governed by the communities that depend on them. Land trusts hold territory for community benefit rather than private speculation. Seed libraries preserve genetic diversity as a shared inheritance. Mutual aid networks ensure that everyone has access to the resources they need. These are not utopian abstractions but practical tools that communities across Cascadia are using right now to build resilience and care for each other and the land.</p>

    <p><strong>Indigenous Foundations</strong></p>

    <p>Any honest bioregional practice must acknowledge that indigenous peoples have been practicing place-based living for thousands of years on these lands. The watersheds we are learning to steward have been tended by indigenous communities long before the bioregionalism movement gave it a name. True bioregionalism centers indigenous knowledge, respects treaty rights, and works toward right relationship with the original stewards of the land.</p>
  field_topic_type: Blog
  image: 1319f89f-83ed-453b-9c08-17a4e1ab0742
  image_alt: River flowing through forest
  field_content_visibility: community

# Topic 3: Watershed Restoration Q1 Update (News, community, Watershed group)
# AI Coverage: Group-scoped content exercises retrieval within group boundaries
a07da695-03f4-4411-99bc-c448e8b4a203:
  uuid: a07da695-03f4-4411-99bc-c448e8b4a203
  title: "Watershed Restoration Progress: Q1 Update"
  type: topic
  langcode: en
  uid: bcead200-a74f-4e24-93c4-2746436a5207
  body: >
    <p>Hello Watershed Guardians! Here is our quarterly update on restoration projects across the Cascadia watersheds we are monitoring.</p>

    <p><strong>Nooksack River Basin:</strong> Our citizen science team completed 47 water quality sampling events this quarter. Dissolved oxygen levels continue to improve in the upper tributaries where we planted riparian buffers three years ago. We spotted 12 returning Chinook salmon in the Nooksack mainstem, which is the highest count since we began monitoring.</p>

    <p><strong>Willamette Valley:</strong> The riparian restoration project at the Wheatland Ferry crossing is progressing well. Over 200 native willows and cottonwoods were planted by volunteers. We need more hands for the next planting day in March.</p>

    <p><strong>Data Dashboard:</strong> Noah has updated our community science dashboard with the latest water quality data. You can access it through the group files. If you are interested in contributing monitoring data from your local stream, please reach out to me or Noah for training.</p>
