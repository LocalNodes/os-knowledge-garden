# Topic 4: Proposal: Community Solar Installation (Dialog, community, Land Trust group)
2f229d29-7327-4517-ba61-cfdcc639a7cd:
  uuid: 2f229d29-7327-4517-ba61-cfdcc639a7cd
  title: "Proposal: Community Solar Installation at the Commons"
  type: topic
  langcode: en
  uid: 303fe4fb-3c84-4b95-bb20-cb4a5dcf9833
  body: >
    <p>Fellow land trust members, I would like to propose that we install a community-owned solar array on the south-facing roof of the Commons workshop building. The Sunroot Energy Collective has offered to coordinate the installation through their cooperative model.</p>

    <p><strong>The Proposal:</strong> A 15kW solar array that would generate approximately 18,000 kWh per year -- enough to power the workshop, community kitchen, and common areas, with surplus fed back to the grid as community solar credits.</p>

    <p><strong>Cost and Financing:</strong> Estimated cost of $35,000, which we propose to fund through a combination of community shares (invest-to-own model) and a grant from the Cascadia Resilience Fund. Each community share would be $500 and would receive annual dividend payments once the system is generating credits.</p>

    <p>I would love to hear your thoughts on this proposal. What questions do you have? What concerns should we address before bringing this to the full trust membership for a vote?</p>
  field_topic_type: Dialog
