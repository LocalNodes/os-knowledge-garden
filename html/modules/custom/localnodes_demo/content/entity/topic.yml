# Topic 10: Mapping Our Bioregion: Participatory GIS (Dialog, community, Bioregional Hub)
fe0ddb71-d564-4388-89c2-a236ada605b1:
  uuid: fe0ddb71-d564-4388-89c2-a236ada605b1
  title: "Mapping Our Bioregion: Participatory GIS Project"
  type: topic
  langcode: en
  uid: 6306b3d6-eaa9-4571-9973-f07e1dac1caa
  body: >
    <p>I am excited to announce a new participatory GIS project to create a comprehensive map of our bioregion's ecological and community assets. The goal is to build a shared spatial database that helps us understand the relationships between watersheds, habitats, food systems, and human settlements across Cascadia.</p>

    <p><strong>What We Want to Map:</strong></p>
    <ul>
    <li>Watershed boundaries and major waterways</li>
    <li>Salmon spawning habitat and restoration sites</li>
    <li>Community gardens, food forests, and seed libraries</li>
    <li>Community land trust properties and commons</li>
    <li>Mutual aid network nodes</li>
    <li>Indigenous cultural sites (with tribal consent and guidance)</li>
    </ul>

    <p>The Cascadia Water Institute can provide the base layers and hosting for the GIS platform. What we need from the community is local knowledge -- you know your places better than any satellite can. Who wants to help build this map?</p>
  field_topic_type: Dialog
