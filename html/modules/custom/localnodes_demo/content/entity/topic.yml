  image_alt:
  field_content_visibility: community

# Topic 7: Food Forest Design Workshop Follow-up (News, community, Watershed group)
fb18bb32-6545-471d-b172-eb1a831c2189:
  uuid: fb18bb32-6545-471d-b172-eb1a831c2189
  title: Food Forest Design Workshop Follow-up
  type: topic
  langcode: en
  uid: 3fe46397-9193-4d85-9848-f8972eba32f2
  body: >
    <p>Thank you to everyone who attended last week's food forest design workshop! We had 24 participants and covered the seven layers of a food forest, guild planting for our Pacific Northwest bioregion, and how to read your site's water flow patterns.</p>

    <p>The design plans we created are available in the group files. Remember, the key to a good food forest is patience and observation. Spend at least one full season observing your site before you start planting. Watch where the water flows, where the sun hits, where the frost settles.</p>

    <p>Our next planting day is scheduled for three weeks from now. Please sign up in the comments if you can help with the installation at the Nooksack demonstration site.</p>
