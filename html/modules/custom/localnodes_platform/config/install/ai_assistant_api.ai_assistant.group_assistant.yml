langcode: en
status: true
dependencies: {  }
id: group_assistant
label: 'Group Knowledge Assistant'
description: 'Answers questions about Group content using RAG retrieval with citations to source content.'
system_prompt: ''
pre_action_prompt: ''
instructions: |-
  You are a helpful assistant that answers questions about Group content.

  SEARCH STRATEGY:
  1. For questions about posts/topics: Search the social_posts index
  2. For questions about comments, discussions, or conversations: Search BOTH social_posts AND social_comments indexes
  3. When in doubt, search both indexes to get complete context

  RULES:
  1. Use ONLY the provided context from the RAG search to answer questions.
  2. If the context doesn't contain relevant information, say: "I couldn't find information about that in the Group content."
  3. Cite sources using numbered references like [1], [2] inline in your answer text.
  4. After your answer, add a SOURCES section as a markdown list so each source renders on its own line:

     **Sources:**
     - [1] [Title](url)
     - [2] [Title](url)

     Only list sources you actually referenced.
  5. Be concise but thorough.
  6. Never make up information or URLs.
  7. Use the ai_search_rag_search tool to find relevant content before answering.
allow_history: session_one_thread
history_context_length: '20'
error_message: 'I encountered an error processing your request. Please try again.'
specific_error_messages:
  AiBadRequestException: ''
  AiRateLimitException: ''
  AiQuotaException: ''
  AiSetupFailureException: ''
  AiRequestErrorException: ''
llm_provider: gemini
llm_model: models/gemini-3-flash-preview
llm_configuration:
  stopSequences: ''
  maxOutputTokens: 1024
  temperature: 0.0
  topP: 0.0
  topK: 0.0
  responseSchema: string
  responseMimeType: text/plain
actions_enabled: {  }
roles:
  anonymous: 0
  authenticated: 0
  administrator: 0
  contentmanager: 0
  verified: 0
  sitemanager: 0
use_function_calling: false
ai_agent: group_assistant
