  title: Willamette Watershed Assembly
  type: event
  langcode: en
  uid: p0rt1004-0001-4001-a001-000000000002
  body: >
    <p>Join us for the Willamette Watershed Assembly, bringing together stewards, scientists, and organizers from across the Willamette Valley. This gathering is where we share monitoring data, celebrate restoration victories, coordinate upcoming projects, and strengthen the bonds that hold our watershed community together.</p>

    <p>This season's assembly will focus on salmon habitat recovery progress on Johnson Creek and Fanno Creek, community science data analysis, and planning for the summer planting season. Each tributary monitoring team will present their seasonal report. Whether you have been planting willows along the creek or mapping spawning habitat, the Assembly is your chance to see how all these efforts connect across the watershed.</p>
