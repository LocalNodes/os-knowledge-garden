# Event 2: Seed Swap & Rain Garden Workshop (future +14 day, community, Food Commons)
p0rt1007-0001-4001-a001-000000000002:
  uuid: p0rt1007-0001-4001-a001-000000000002
  title: "Seed Swap & Rain Garden Workshop"
  type: event
  langcode: en
  uid: p0rt1004-0001-4001-a001-000000000003
  body: >
    <p>Bring your saved seeds, plant starts, and growing tips to share with fellow Portland growers. This is our spring seed swap where we strengthen the genetic diversity of our regional food systems by exchanging locally adapted varieties that thrive in Portland's rain-fed climate.</p>

    <p>Sage will lead a workshop on designing rain gardens that double as food-producing spaces -- turning stormwater management into food sovereignty. We will cover Pacific Northwest guild design, soil building in our clay-heavy soils, and season extension for the dry summer months. Even if you do not have seeds to bring, come learn and take home something to grow.</p>
