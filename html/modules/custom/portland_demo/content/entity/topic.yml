# 3 topics for Portland bioregional community

# Topic 1: Welcome to Portland Node (Blog, public, no group)
p0rt1006-0001-4001-a001-000000000001:
  uuid: p0rt1006-0001-4001-a001-000000000001
  title: "Welcome to the Portland Node: Rain-Fed Resilience"
  type: topic
  langcode: en
  uid: p0rt1004-0001-4001-a001-000000000001
  body: >
    <p><strong>Welcome to the Portland LocalNodes Instance</strong></p>

    <p>The Portland node is a community platform for the people building regenerative systems across the Willamette Valley. We are watershed stewards monitoring the Willamette and its tributaries, urban farmers growing food sovereignty in every neighborhood, land trust organizers holding ground against displacement, and community builders weaving it all together. What unites us is a commitment to place-based regeneration rooted in the rain-fed landscapes of the Pacific Northwest.</p>

    <p><strong>What Makes Portland's Node Unique</strong></p>

    <p>Portland sits at the confluence of the Willamette and Columbia Rivers, in one of the most biodiverse temperate valleys on Earth. Our bioregion stretches from the Cascade snowpack to the valley floor, with 150 inches of annual rainfall in the Coast Range funneling through watersheds that sustain salmon, old-growth forest, and some of the richest agricultural soil in the world. This abundance is our foundation -- and our responsibility.</p>

    <p><strong>How This Platform Works</strong></p>

    <p>The Portland node is organized around working groups that reflect our community's priorities: the Willamette Watershed Network for ecological stewardship, and the Portland Food Commons for urban agriculture and food sovereignty. Within each group, members share knowledge through topics, coordinate through events, and stay connected through posts. Join the groups that align with your work and start connecting.</p>

    <p><strong>Part of a Network</strong></p>

    <p>The Portland node is one instance in the LocalNodes network. We are connected to other bioregional nodes including the Cascadia instance and the Boulder node on the Front Range. When you share knowledge here, it can benefit stewards in other bioregions -- and their insights can benefit us. This is cosmo-local coordination in practice: knowledge shared globally, action rooted locally. Welcome to the node.</p>
  field_topic_type: Blog
