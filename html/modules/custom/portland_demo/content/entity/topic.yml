# Topic 3: Urban Food Forest Design for Portland (Blog, community, Food Commons)
p0rt1006-0001-4001-a001-000000000003:
  uuid: p0rt1006-0001-4001-a001-000000000003
  title: "Urban Food Forest Design for Portland's Rain-Fed Climate"
  type: topic
  langcode: en
  uid: p0rt1004-0001-4001-a001-000000000003
  body: >
    <p>Designing food forests in Portland means working with one of the best growing climates in North America -- if you embrace the rain. With mild winters, 37 inches of annual rainfall, and long cool springs, we can grow an incredible diversity of food with almost no irrigation.</p>

    <p><strong>Rain as Asset:</strong> Unlike arid bioregions that must engineer water harvesting, Portland food forests can rely on natural rainfall for most of the year. Our design challenge is managing excess water in winter and retaining moisture through the dry summers of July and August. Deep mulch, swales, and shade-tolerant understory plantings are key.</p>

    <p><strong>Pacific Northwest Guild:</strong> Our food forest guilds center on fruit and nut trees that thrive here -- apple, pear, plum, hazelnut, and walnut as canopy. Understory includes currants, gooseberries, blueberries (they love our acidic soil), and honeyberry. Ground layer is strawberry, comfrey, and native camas. This is abundance by design.</p>

    <p><strong>Community Food Access:</strong> The Portland Food Commons operates four community food forests across the city, each designed as a neighborhood commons where anyone can harvest. We are proving that food sovereignty does not require private land ownership -- it requires community stewardship of shared abundance.</p>

    <p>If you are interested in starting a food forest in your neighborhood, come to the Seed Swap workshop. We will do site assessment exercises and I can help you get started with a design suited to your specific microclimate.</p>
  field_topic_type: Blog
