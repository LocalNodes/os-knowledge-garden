# Topic 2: Willamette Salmon Habitat Restoration (Blog, community, Watershed Network)
p0rt1006-0001-4001-a001-000000000002:
  uuid: p0rt1006-0001-4001-a001-000000000002
  title: "Willamette Salmon Habitat: Spring Restoration Update"
  type: topic
  langcode: en
  uid: p0rt1004-0001-4001-a001-000000000002
  body: >
    <p>Hello Watershed Network members! Here is our spring update on salmon habitat restoration projects across the Willamette tributaries we are monitoring.</p>

    <p><strong>Johnson Creek:</strong> The Willamette Watershed Alliance completed the first phase of our riparian restoration project. We planted 800 native willows, red osier dogwood, and Oregon ash along a quarter-mile stretch where bank erosion had eliminated shade cover. Early monitoring shows water temperatures dropping 2 degrees Fahrenheit in the restored reach -- critical for returning coho salmon.</p>

    <p><strong>Fanno Creek:</strong> Working with the Tualatin Watershed Council, we removed two fish passage barriers that had blocked salmon migration for decades. The first returning coho were spotted above the former barrier sites within three months. Community science volunteers are monitoring spawning activity through the winter season.</p>

    <p><strong>Community Science Dashboard:</strong> We have updated our monitoring dashboard with the latest dissolved oxygen, turbidity, temperature, and macroinvertebrate data from 15 volunteer monitoring stations across the Willamette tributaries. If you want to contribute monitoring data from your local stretch of creek, reach out to River for training on our protocols.</p>
  field_topic_type: Blog
