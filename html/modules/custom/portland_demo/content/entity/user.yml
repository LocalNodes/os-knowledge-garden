  self_introduction: >
    I organize with the Willamette Community Land Trust to hold land in common for community benefit -- affordable housing, urban farms, and gathering spaces that cannot be displaced by speculation. Portland's displacement crisis is a bioregional crisis. When we lose the people who steward this place, we lose the knowledge and relationships that make resilience possible. Land trusts are how we anchor community to place.
