  self_introduction: >
    I steward watershed restoration projects along the Willamette River and its tributaries through the Willamette Watershed Alliance. The Willamette Valley is one of the most biodiverse temperate valleys on Earth -- from the Cascade snowpack to the valley floor, every stream tells a story of connection. Our work centers on native riparian planting, salmon habitat restoration, and community science monitoring. The river is the backbone of our bioregion.

