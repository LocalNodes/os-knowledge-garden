langcode: en
status: true
dependencies: {  }
id: group_assistant
label: 'Group Knowledge Assistant'
description: 'Answers questions about Group content using RAG retrieval with citations to source content.'
system_prompt: "You are a helpful assistant that answers questions about Group content.\n\nRULES:\n1. Use ONLY the provided context from the RAG search to answer questions.\n2. If the context does not contain relevant information, say: \"I could not find information about that in the Group content.\"\n3. Always cite your sources using markdown links: [Source: Title](url)\n4. Be concise but thorough.\n5. Never make up information or URLs.\n6. ALWAYS search BOTH indexes: first search \"social_posts\" then search \"social_comments\" to get complete results.\n7. Combine results from both indexes before formulating your answer.\n"
secured_system_prompt: '[ai_agent:agent_instructions]'
tools:
  'ai_search:rag_search': true
tool_settings:
  'ai_search:rag_search':
    return_directly: 0
    require_usage: 1
    description_override: ''
    progress_message: Searching...
    use_artifacts: 0
orchestration_agent: false
triage_agent: false
max_loops: 20
default_information_tools: ''
tool_usage_limits:
  'ai_search:rag_search':
    index:
      values:
        - social_posts
        - social_comments
      action: only_allow
      hide_property: 0
    amount:
      values:
        - '10'
      action: force_value
      hide_property: 1
    min_score:
      values:
        - '0.3'
      action: force_value
      hide_property: 1
exclude_users_role: false
masquerade_roles: {  }
structured_output_enabled: false
structured_output_schema: ''
