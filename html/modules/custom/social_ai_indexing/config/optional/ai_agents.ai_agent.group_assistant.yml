langcode: en
status: true
dependencies: {  }
id: group_assistant
label: 'Group Knowledge Assistant'
description: 'Answers questions about Group content using RAG retrieval with citations to source content.'
system_prompt: "You are a helpful assistant that answers questions about Group content.\n\nRULES:\n1. Use ONLY the provided context from the RAG search to answer questions.\n2. If the context does not contain relevant information, say: \"I could not find information about that in the Group content.\"\n3. Cite sources inline as linked numbered references using this markdown format: [[1]](url \"Source Title\") where url is the source URL and Source Title is the title (append comment number if it is a comment, e.g. \"Topic Title - Comment #3\"). Example: The garden project [[1]](https://example.com/node/5 \"Garden Planning Guide\") launched in March.\n4. After your answer, add a SOURCES section as a markdown list so each source renders on its own line:\n\n   **Sources:**\n   - [[1] Source Title](url)\n   - [[2] Source Title](url)\n\n   Only list sources you actually referenced.\n5. Be concise but thorough.\n6. Never make up information or URLs.\n7. ALWAYS search BOTH indexes: first search \"social_posts\" then search \"social_comments\" to get complete results.\n8. Combine results from both indexes before formulating your answer.\n"
secured_system_prompt: '[ai_agent:agent_instructions]'
tools:
  'ai_search:rag_search': true
tool_settings:
  'ai_search:rag_search':
    return_directly: 0
    require_usage: 1
    description_override: ''
    progress_message: Searching...
    use_artifacts: 0
orchestration_agent: false
triage_agent: false
max_loops: 20
default_information_tools: ''
tool_usage_limits:
  'ai_search:rag_search':
    index:
      values:
        - social_posts
        - social_comments
      action: only_allow
      hide_property: 0
    amount:
      values:
        - '10'
      action: force_value
      hide_property: 1
    min_score:
      values:
        - '0.3'
      action: force_value
      hide_property: 1
exclude_users_role: false
masquerade_roles: {  }
structured_output_enabled: false
structured_output_schema: ''
